<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Motorista - BeGO</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', sans-serif;
    }

    body{
      height:100vh;
      background: linear-gradient(135deg,#250821,#1a1a2e);
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .card{
      width:380px;
      background: rgba(255,255,255,0.05);
      -webkit-backdrop-filter: blur(15px);
      backdrop-filter: blur(15px);
      border-radius:20px;
      padding:35px;
      box-shadow: 0 0 30px rgba(18,247,255,0.3);
      animation: fadeIn 0.8s ease;
    }

    h2{
      text-align:center;
      margin-bottom:25px;
      color:#12f7ff;
    }

    .input-group{
      margin-bottom:18px;
    }

    label{
      font-size:0.9rem;
      opacity:0.8;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:6px;
      border:none;
      border-radius:10px;
      background:#292e33;
      color:white;
      outline:none;
      transition:0.3s;
    }

    input:focus{
      box-shadow:0 0 10px #12f7ff;
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#12f7ff;
      color:black;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
    }

    .btn:hover{
      transform:scale(1.05);
      box-shadow:0 0 15px #12f7ff;
    }

    .btn-huella{
      display:none;
      width:100%;
      padding:13px;
      border:1px solid rgba(18,247,255,0.55);
      border-radius:10px;
      background:rgba(18,247,255,0.08);
      color:#ffffff;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
    }

    .btn-huella.visible{
      display:block;
    }

    .btn-huella:hover{
      background:rgba(18,247,255,0.16);
      box-shadow:0 0 12px rgba(18,247,255,0.35);
    }

    .link{
      text-align:center;
      margin-top:15px;
    }

    .link a{
      color:#12f7ff;
      text-decoration:none;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(20px);}
      to{opacity:1; transform:translateY(0);}
    }

    @media(max-width:450px){
      .card{
        width:90%;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Login Motorista</h2>

    <div class="input-group">
      <label>Teléfono</label>
      <input type="text" id="telefono" placeholder="Ingrese su teléfono">
    </div>

    <div class="input-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="Ingrese su contraseña">
    </div>

    <button class="btn" id="btnLogin">Ingresar</button>
    <button class="btn-huella" id="btnHuella" type="button">Ingresar con huella</button>

    <div class="link">
      ¿No tienes cuenta? <a href="registro.html">Registrarse</a>
    </div>
  </div>

  <script>
    console.log("LOGIN HTML CARGADO");
  </script>


<script src="./js/core/conexion.js"></script>
<script src="./js/auth/login.js"></script>
<script type="module" src="./js/modules/huellas/huellas.login.js"></script>




</body>
</html>
