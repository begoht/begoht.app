<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Soporte | BeGO</title>

  <link rel="stylesheet" href="../css/chat-soporte.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="chat-header">
  <i class="fa-solid fa-headset"></i>
  <span>Soporte BeGO</span>
</header>

<main class="chat-body" id="chatBody"></main>

<footer class="chat-input">
  <input id="mensajeInput" type="text" placeholder="Escribí tu mensaje…">
  <button id="enviarBtn"><i class="fa-solid fa-paper-plane"></i></button>
</footer>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script type="module" src="../js/chat-soporte.js"></script>


</body>
</html>
