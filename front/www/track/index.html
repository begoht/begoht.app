<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Seguimiento BeGO</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="../vendor/leaflet/leaflet.css?v=1.9.4">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --surface: rgba(255, 255, 255, 0.96);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background: #eef4ff;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100dvh;
    }

    .track-shell {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: linear-gradient(180deg, #f8fbff 0%, #dbeafe 100%);
    }

    #map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background: #dbeafe;
    }

    .top-bar {
      position: absolute;
      z-index: 800;
      top: calc(12px + var(--safe-top));
      left: 14px;
      right: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .brand-chip,
    .state-chip {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 42px;
      padding: 8px 12px;
      border: 1px solid rgba(37, 99, 235, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.14);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .brand-chip img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }

    .brand-chip strong {
      font-size: 14px;
      letter-spacing: 0;
    }

    .state-chip {
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .state-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 7px rgba(34, 197, 94, 0.16);
    }

    .details-panel {
      position: absolute;
      z-index: 900;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: calc(100dvh - 82px - var(--safe-top));
      padding: 12px 14px calc(14px + var(--safe-bottom));
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.98)),
        var(--surface);
      box-shadow: 0 -22px 60px rgba(15, 23, 42, 0.18);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .drag-handle {
      width: 42px;
      height: 5px;
      margin: 0 auto 12px;
      border-radius: 999px;
      background: #cbd5e1;
    }

    .status-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .trip-eyebrow {
      display: block;
      margin-bottom: 4px;
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .trip-status {
      margin: 0;
      color: var(--ink);
      font-size: clamp(22px, 6vw, 32px);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 900;
    }

    .eta-pill {
      flex: 0 0 auto;
      min-width: 72px;
      padding: 8px 10px;
      border-radius: 18px;
      color: #fff;
      text-align: center;
      background: linear-gradient(135deg, var(--primary), #0f172a);
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.22);
    }

    .eta-pill span {
      display: block;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      opacity: 0.82;
    }

    .eta-pill strong {
      display: block;
      margin-top: 1px;
      font-size: 15px;
      line-height: 1.1;
    }

    .route-card,
    .driver-card,
    .final-card {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 16px 38px rgba(15, 23, 42, 0.08);
    }

    .route-card {
      display: grid;
      gap: 0;
      padding: 4px 14px;
    }

    .address-item {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      min-height: 62px;
      padding: 10px 0;
    }

    .address-item + .address-item {
      border-top: 1px solid var(--line);
    }

    .address-icon {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      color: #fff;
      background: #22c55e;
    }

    .address-item.dest .address-icon {
      background: #ef4444;
    }

    .address-meta span {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .address-meta strong {
      display: -webkit-box;
      overflow: hidden;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.28;
      font-weight: 750;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow-wrap: anywhere;
    }

    .driver-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      margin-top: 12px;
      padding: 13px;
    }

    .driver-profile {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .driver-img {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      object-fit: cover;
      background: #e2e8f0;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.06);
    }

    .driver-name {
      display: block;
      overflow: hidden;
      color: var(--ink);
      font-size: 16px;
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .driver-meta {
      display: block;
      overflow: hidden;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .driver-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .car-plate {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 7px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      color: var(--ink);
      background: #f8fafc;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .btn-call {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 16px;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, #22c55e, #15803d);
      box-shadow: 0 12px 26px rgba(34, 197, 94, 0.22);
    }

    .final-card {
      display: none;
      margin-top: 12px;
      padding: 16px;
      color: #fff;
      border-color: rgba(37, 99, 235, 0.18);
      background:
        radial-gradient(circle at 20% 0%, rgba(96, 165, 250, 0.38), transparent 30%),
        linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%);
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.22);
    }

    .final-head {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .final-icon {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 16px;
      color: #172554;
      background: #dbeafe;
    }

    .final-card h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .final-card p {
      margin: 4px 0 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
      line-height: 1.35;
    }

    .social-links,
    .download-links {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      margin-top: 12px;
    }

    .social-links a,
    .download-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 0;
      min-height: 42px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      color: #fff;
      font-size: 12px;
      font-weight: 850;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .social-links a span,
    .download-links a span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .download-links {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .download-links a {
      color: #172554;
      background: #dbeafe;
      border-color: transparent;
    }

    .map-ended-shade {
      position: absolute;
      inset: 0;
      z-index: 700;
      display: none;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.02), rgba(15, 23, 42, 0.36));
    }

    .loading-state {
      position: fixed;
      z-index: 1200;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f8fbff;
    }

    .loading-card {
      width: min(100%, 320px);
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 26px;
      text-align: center;
      background: #fff;
      box-shadow: 0 22px 55px rgba(15, 23, 42, 0.12);
    }

    .loading-logo {
      width: 62px;
      height: 62px;
      margin: 0 auto 14px;
      border-radius: 22px;
      object-fit: cover;
      box-shadow: 0 16px 34px rgba(37, 99, 235, 0.2);
    }

    .loading-card strong {
      display: block;
      font-size: 20px;
      letter-spacing: 0;
    }

    .loading-card span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .loading-card::after {
      content: "";
      display: block;
      width: 52px;
      height: 4px;
      margin: 18px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      animation: shimmer 1.1s ease-in-out infinite;
    }

    body.ready .loading-state {
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    body.trip-ended .state-dot {
      background: #60a5fa;
      box-shadow: 0 0 0 7px rgba(96, 165, 250, 0.16);
    }

    body.trip-ended .eta-pill {
      background: linear-gradient(135deg, #0f172a, #2563eb);
    }

    body.trip-ended .final-card,
    body.trip-ended .map-ended-shade {
      display: block;
    }

    body.trip-ended .btn-call {
      pointer-events: none;
      opacity: 0.55;
      filter: grayscale(0.25);
    }

    .custom-label {
      padding: 5px 9px;
      border: none;
      border-radius: 999px;
      color: #fff;
      background: #2563eb;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
      font-size: 11px;
      font-weight: 850;
    }

    .leaflet-tooltip-top:before {
      border-top-color: #2563eb;
    }

    .leaflet-marker-icon.moto-live-icon,
    .moto-live-icon {
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      filter: drop-shadow(0 8px 10px rgba(37, 99, 235, 0.28));
      transition: transform 220ms linear;
      will-change: transform;
    }

    .leaflet-control-attribution {
      display: none;
    }

    @keyframes shimmer {
      0%, 100% {
        transform: scaleX(0.6);
        opacity: 0.4;
      }
      50% {
        transform: scaleX(1);
        opacity: 1;
      }
    }

    @media (min-width: 760px) {
      .details-panel {
        left: 24px;
        right: auto;
        bottom: 24px;
        width: min(420px, calc(100vw - 48px));
        max-height: calc(100dvh - 48px);
        border-radius: 30px;
        padding: 14px;
      }

      .drag-handle {
        display: none;
      }

      .top-bar {
        left: 24px;
        right: 24px;
      }

      .trip-status {
        font-size: 30px;
      }
    }

    @media (max-width: 390px) {
      .details-panel {
        padding-left: 10px;
        padding-right: 10px;
      }

      .status-row {
        gap: 10px;
      }

      .driver-card {
        grid-template-columns: 1fr;
      }

      .driver-actions {
        justify-content: space-between;
      }
    }

    @media (max-width: 480px) {
      .top-bar {
        right: auto;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .final-card {
        margin-right: 12px;
      }

      .social-links {
        grid-template-columns: repeat(3, 48px);
        justify-content: start;
      }

      .social-links a {
        width: 48px;
        height: 46px;
        min-height: 46px;
        padding: 0;
      }

      .download-links {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="track-shell">
    <div id="map"></div>
    <div class="map-ended-shade" aria-hidden="true"></div>

    <div class="top-bar">
      <div class="brand-chip" aria-label="BeGO">
        <img src="/assets/logo_primcial.png" alt="">
        <strong>BeGO</strong>
      </div>
      <div class="state-chip" id="stateChip">
        <span class="state-dot"></span>
        <span id="stateChipText">En vivo</span>
      </div>
    </div>

    <section class="details-panel" aria-label="Detalle de seguimiento">
      <div class="drag-handle" aria-hidden="true"></div>

      <div class="status-row">
        <div>
          <span class="trip-eyebrow" id="tripEyebrow">Seguimiento privado</span>
          <h1 class="trip-status" id="tripStatus">Moto en camino</h1>
        </div>
        <div class="eta-pill">
          <span id="etaLabel">Estado</span>
          <strong id="etaValue">Live</strong>
        </div>
      </div>

      <div class="route-card">
        <div class="address-item">
          <span class="address-icon"><i class="fa-solid fa-circle"></i></span>
          <div class="address-meta">
            <span>Origen</span>
            <strong id="originText">Cargando origen...</strong>
          </div>
        </div>
        <div class="address-item dest">
          <span class="address-icon"><i class="fa-solid fa-location-dot"></i></span>
          <div class="address-meta">
            <span>Destino</span>
            <strong id="destText">Cargando destino...</strong>
          </div>
        </div>
      </div>

      <div class="driver-card">
        <div class="driver-profile">
          <img src="/assets/logo_primcial.png" id="driverImg" class="driver-img" alt="Motorista">
          <div>
            <strong class="driver-name" id="driverName">Motorista BeGO</strong>
            <span class="driver-meta" id="carModel">Moto</span>
          </div>
        </div>
        <div class="driver-actions">
          <span class="car-plate" id="carPlate">S/P</span>
          <a href="#" class="btn-call" id="callBtn" aria-label="Llamar motorista">
            <i class="fa-solid fa-phone"></i>
          </a>
        </div>
      </div>

      <div class="final-card" id="finalCard" aria-live="polite">
        <div class="final-head">
          <span class="final-icon"><i class="fa-solid fa-check"></i></span>
          <div>
            <h2 id="finalTitle">Viaje finalizado</h2>
            <p id="finalSubtitle">El seguimiento en vivo se cerro correctamente.</p>
          </div>
        </div>
        <div class="social-links" aria-label="Redes sociales BeGO">
          <a href="https://www.facebook.com/search/top?q=bego%20haiti" target="_blank" rel="noopener">
            <i class="fa-brands fa-facebook-f"></i><span>FB</span>
          </a>
          <a href="https://www.instagram.com/bego.haiti" target="_blank" rel="noopener">
            <i class="fa-brands fa-instagram"></i><span>IG</span>
          </a>
          <a href="https://www.tiktok.com/@bego.ht" target="_blank" rel="noopener">
            <i class="fa-brands fa-tiktok"></i><span>TT</span>
          </a>
        </div>
        <div class="download-links" aria-label="Descargar app BeGO">
          <a href="/download/bego-pasajero.apk?v=20260703-passenger-color" download>
            <i class="fa-solid fa-mobile-screen-button"></i><span>Pasajero</span>
          </a>
          <a href="/download/bego-motorista.apk?v=20260703-driver-install" download>
            <i class="fa-solid fa-motorcycle"></i><span>Motorista</span>
          </a>
        </div>
      </div>
    </section>
  </div>

  <div class="loading-state" id="loadingState">
    <div class="loading-card">
      <img src="/assets/logo_primcial.png" class="loading-logo" alt="">
      <strong>BeGO</strong>
      <span>Preparando seguimiento seguro</span>
    </div>
  </div>

  <script src="../js/core/production-console.js?v=20260606-console-clean"></script>
  <script src="../vendor/leaflet/leaflet.js?v=1.9.4"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="./seguir.js?v=20260628-dark-route-locked"></script>
</body>
</html>
