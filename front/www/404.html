<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020616">
  <meta name="robots" content="noindex">
  <title>Page introuvable - BeGO</title>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100dvh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #f8fafc;
      background:
        radial-gradient(circle at 50% 0%, rgba(37, 99, 235, .26), transparent 38%),
        #020616;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(480px, 100%);
      padding: 32px 24px;
      border: 1px solid rgba(148, 163, 184, .18);
      border-radius: 24px;
      background: rgba(7, 17, 31, .9);
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, .45);
    }
    strong { color: #60a5fa; font-size: 4rem; line-height: 1; }
    h1 { margin: 14px 0 8px; }
    p { margin: 0 0 22px; color: #cbd5e1; line-height: 1.55; }
    a {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      border-radius: 12px;
      color: #fff;
      background: #2563eb;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <strong>404</strong>
    <h1>Page introuvable</h1>
    <p>Cette adresse n'existe pas ou a été déplacée.</p>
    <a href="/">Retour à BeGO</a>
  </main>
</body>
</html>
